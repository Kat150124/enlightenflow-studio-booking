<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>舞蹈教室借用系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:rgba(0,0,0,.13);--border2:rgba(0,0,0,.25);
  --radius:10px;--radius-lg:14px;
  --green-bg:#d4edba;--green-text:#2d6a0a;
  --amber-bg:#f5c842;--amber-text:#5a3a00;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --blue-bg:#E6F1FB;--blue-text:#185FA5;
}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:rgba(255,255,255,.13);--border2:rgba(255,255,255,.25)}}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:1rem;color:var(--text);background:var(--bg3);min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:1.4rem;font-weight:700;margin-bottom:1.5rem}
h2{font-size:1.1rem;font-weight:600;margin-bottom:1rem}
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:10px 18px;border:none;background:transparent;cursor:pointer;font-size:1rem;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.panel{display:none}.panel.active{display:block}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;margin-bottom:1rem}
.btn{padding:8px 16px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:0.95rem;color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:5px 12px;font-size:0.85rem}
.btn-danger{border-color:#E24B4A;color:var(--red-text)}.btn-danger:hover{background:var(--red-bg)}
.btn-success{border-color:#4a8a1a;color:var(--green-text)}.btn-success:hover{background:var(--green-bg)}
select,input[type=text],input[type=date]{height:42px;padding:0 12px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:1rem;background:var(--bg);color:var(--text);outline:none;width:100%}
select:focus,input:focus{box-shadow:0 0 0 2px rgba(0,0,0,.12)}
label{font-size:0.95rem;color:var(--text2);display:block;margin-bottom:8px;font-weight:500}
.form-group{margin-bottom:18px}
.badge{display:inline-block;font-size:0.78rem;padding:3px 10px;border-radius:var(--radius);font-weight:600}
.badge-pending{background:var(--amber-bg);color:var(--amber-text)}
.badge-confirmed{background:var(--green-bg);color:var(--green-text)}
.badge-rejected{background:var(--red-bg);color:var(--red-text)}
.tag{font-size:0.78rem;padding:3px 10px;border-radius:var(--radius);background:var(--bg2);color:var(--text2)}
.tag-room{background:var(--blue-bg);color:var(--blue-text)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-nav span{font-size:1.1rem;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-head{background:var(--bg2);padding:8px 4px;text-align:center;font-size:0.85rem;color:var(--text2);font-weight:600}
.cal-day{background:var(--bg);padding:6px 4px;min-height:72px;cursor:pointer;transition:background .1s}
.cal-day:hover{background:var(--bg2)}
.cal-day.other-month{opacity:.3}
.cal-day.today .day-num{background:var(--text);color:var(--bg);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.day-num{font-size:0.85rem;font-weight:600;margin-bottom:3px;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.day-event{font-size:0.7rem;padding:2px 4px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500}
.ev-pending{background:var(--amber-bg);color:var(--amber-text)}
.ev-confirmed{background:var(--green-bg);color:var(--green-text)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:1.25rem;width:100%;max-width:420px;border:0.5px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-title{font-size:1.05rem;font-weight:600;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.close-btn{background:none;border:none;cursor:pointer;font-size:1.4rem;color:var(--text2);line-height:1;padding:4px}
.booking-item{border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.booking-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.member-chips{display:flex;flex-wrap:wrap;gap:8px}
.member-chip{padding:7px 16px;border:0.5px solid var(--border2);border-radius:20px;font-size:0.95rem;cursor:pointer;transition:all .15s;background:var(--bg);color:var(--text);user-select:none}
.member-chip:hover{background:var(--bg2)}
.member-chip.selected{background:var(--text);color:var(--bg);border-color:var(--text)}
.slider-track{position:relative;height:50px;display:flex;align-items:center;padding:0 12px;touch-action:none}
.slider-bg{position:absolute;left:12px;right:12px;height:7px;background:var(--bg3);border-radius:4px}
.slider-fill{position:absolute;height:7px;background:var(--text);border-radius:4px;pointer-events:none}
.slider-thumb{position:absolute;width:26px;height:26px;border-radius:50%;background:var(--bg);border:2.5px solid var(--text);cursor:grab;transform:translateX(-50%);z-index:2}
.slider-thumb:active{cursor:grabbing;box-shadow:0 0 0 5px rgba(0,0,0,.1)}
.time-display{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}
.time-badge{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:8px 10px;font-size:1.1rem;font-weight:600;text-align:center;flex:1}
.hour-marks{display:flex;justify-content:space-between;padding:0 6px;margin-top:4px}
.hour-mark{font-size:0.72rem;color:var(--text3)}
.notice{font-size:0.85rem;color:var(--text2);margin-top:12px;padding:10px 14px;background:var(--bg2);border-radius:var(--radius)}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:0.95rem;margin-bottom:6px}
.add-row{display:flex;gap:8px;margin-top:10px}.add-row input{flex:1}
.loading{text-align:center;padding:2rem;color:var(--text2);font-size:0.95rem}
.legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text2)}
.legend-dot{width:14px;height:14px;border-radius:3px}
.join-opt{padding:10px 14px;border:0.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-size:0.95rem}
.join-opt:hover{background:var(--bg2)}
.join-opt.selected{background:var(--bg2);border-color:var(--text)}
input.time-badge{outline:none;font-family:inherit;cursor:text;width:100%}
input.time-badge:focus{border-color:var(--text);background:var(--bg);box-shadow:0 0 0 2px rgba(0,0,0,.1)}
input.time-err{border-color:#E24B4A!important;background:#FCEBEB!important}
.dialog-box{background:var(--bg);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:300px;border:0.5px solid var(--border);text-align:center}
.dialog-msg{font-size:1rem;line-height:1.5;margin-bottom:1.25rem;color:var(--text)}
.dialog-btns{display:flex;gap:10px;justify-content:center}
.dialog-btns .btn{flex:1}
@media(max-width:600px){
  .container{padding:1rem 0.75rem}
  h1{font-size:1.2rem}
  .cal-day{min-height:56px;padding:4px 2px}
  .day-num{font-size:0.8rem;width:22px;height:22px}
  .cal-day.today .day-num{width:22px;height:22px}
  .day-event{font-size:0.65rem;padding:1px 3px}
  .tab{padding:9px 12px;font-size:0.9rem}
  .member-chip{padding:6px 12px;font-size:0.9rem}
  .time-badge{font-size:1rem;padding:7px 6px}
}
</style>
</head>
<body>
<div class="container">
  <h1>🕺 舞蹈教室借用系統</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('calendar')">📅 預約日曆</button>
    <button class="tab" onclick="switchTab('apply')">✏️ 預約申請</button>
    <button class="tab" onclick="switchTab('admin')">⚙️ 管理員專區</button>
  </div>

  <div id="panel-calendar" class="panel active">
    <div class="cal-nav">
      <button class="btn btn-sm" onclick="navCal(-1)">&#8592;</button>
      <span id="cal-title"></span>
      <button class="btn btn-sm" onclick="navCal(1)">&#8594;</button>
    </div>
    <div id="cal-container"><div class="loading">載入中…</div></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green-bg)"></div>已確認</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber-bg)"></div>待審核</div>
    </div>
  </div>

  <div id="panel-apply" class="panel">
    <div class="card">
      <h2>申請借用教室</h2>
      <div class="form-group">
        <label>培訓生（可多選）</label>
        <div class="member-chips" id="member-chips"><div class="loading">載入中…</div></div>
      </div>
      <div class="form-group">
        <label>日期</label>
        <input type="date" id="apply-date" style="max-width:220px" onchange="onDateChange()">
      </div>
      <div class="form-group" id="join-group" style="display:none">
        <label>加入現有預約（選填）</label>
        <div id="join-options" style="display:flex;flex-direction:column;gap:8px"></div>
        <div style="font-size:0.82rem;color:var(--text2);margin-top:6px">選擇後時段自動帶入，也可以不選、自行填寫新時段</div>
      </div>
      <div class="form-group">
        <label>借用時段</label>
        <div class="slider-track" id="slider-track">
          <div class="slider-bg"></div>
          <div class="slider-fill" id="slider-fill"></div>
          <div class="slider-thumb" id="thumb-start"></div>
          <div class="slider-thumb" id="thumb-end"></div>
        </div>
        <div class="hour-marks" id="hour-marks"></div>
        <div class="time-display">
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
            <div style="font-size:0.82rem;color:var(--text2)">開始</div>
            <input class="time-badge" id="disp-start" type="text" maxlength="5" placeholder="08:00">
          </div>
          <span style="font-size:1rem;color:var(--text2);margin-top:20px">→</span>
          <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
            <div style="font-size:0.82rem;color:var(--text2)">結束</div>
            <input class="time-badge" id="disp-end" type="text" maxlength="5" placeholder="10:00">
          </div>
        </div>
        <div style="text-align:center;font-size:0.85rem;color:var(--text2);margin-top:8px" id="disp-dur">共 2 小時</div>
        <div style="text-align:center;font-size:0.82rem;color:#A32D2D;margin-top:4px;min-height:16px" id="time-error"></div>
      </div>
      <div class="form-group">
        <label>用途說明</label>
        <input type="text" id="apply-note" placeholder="例：排練、拍作業、自主練習">
      </div>
      <button class="btn btn-primary" id="submit-btn" onclick="submitBooking()" style="width:100%;height:46px;font-size:1rem">送出申請</button>
      <div class="notice">教室由管理員審核後分配，確認後才算完成預約。</div>
    </div>
    <div class="card" style="margin-top:0">
      <h2 style="margin-bottom:0.5rem">取消我的預約</h2>
      <div style="font-size:0.85rem;color:var(--text2);margin-bottom:1rem">選擇培訓生，查看可取消的預約</div>
      <div class="form-group" style="margin-bottom:10px">
        <label>選擇培訓生</label>
        <select id="cancel-member" onchange="loadMyBookings()" style="max-width:220px"><option value="">— 選擇 —</option></select>
      </div>
      <div id="my-bookings"></div>
    </div>
  </div>

  <div id="panel-admin" class="panel">
    <h2>預約審核</h2>
    <div id="admin-bookings"><div class="loading">載入中…</div></div>
    <div style="margin-top:1.5rem">
      <div onclick="toggleSection('section-members')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;border-top:0.5px solid var(--border)">
        <span style="font-size:1rem;font-weight:600">培訓生名單</span>
        <span id="arrow-members" style="font-size:0.85rem;color:var(--text2);transition:transform .2s">▼</span>
      </div>
      <div id="section-members" style="display:none;margin-top:6px">
        <div class="card" style="margin-bottom:0">
          <div id="member-list"></div>
          <div class="add-row"><input type="text" id="new-member" placeholder="新增培訓生"><button class="btn btn-sm btn-success" onclick="addMember()">＋</button></div>
        </div>
      </div>
      <div onclick="toggleSection('section-rooms')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;border-top:0.5px solid var(--border);margin-top:4px">
        <span style="font-size:1rem;font-weight:600">教室列表</span>
        <span id="arrow-rooms" style="font-size:0.85rem;color:var(--text2);transition:transform .2s">▼</span>
      </div>
      <div id="section-rooms" style="display:none;margin-top:6px">
        <div class="card" style="margin-bottom:0">
          <div id="room-list"></div>
          <div class="add-row"><input type="text" id="new-room" placeholder="新增教室"><button class="btn btn-sm btn-success" onclick="addRoom()">＋</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" style="display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 22px;border-radius:12px;font-size:0.95rem;z-index:400;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:opacity .3s"></div>

<!-- 詳情 Modal -->
<div class="overlay" id="detail-modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title"><span id="modal-title-text"></span><button class="close-btn" onclick="closeModal()">×</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="overlay" id="confirm-overlay">
  <div class="dialog-box">
    <div class="dialog-msg" id="confirm-msg"></div>
    <div class="dialog-btns">
      <button class="btn" onclick="closeConfirm(false)">取消</button>
      <button class="btn btn-danger" id="confirm-ok" onclick="closeConfirm(true)">確定</button>
    </div>
  </div>
</div>

<script>
// ★ 把這裡換成你的 Apps Script 部署網址 ★
const API = 'https://script.google.com/macros/s/AKfycbz5vPezEMV4bbeGZZRI1kyuHtZCzQnIzs7qEi42pnuHbu-LnPzKV-7VpLPDAMo41U4zcg/exec';

// ── 通知與對話框 ──────────────────────────────────────
function pad(n){return String(n).padStart(2,'0')}
function today(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function toHL(h){const hh=Math.floor(h),mm=(h-hh)>=0.5?'30':'00';return pad(hh)+':'+mm;}
function hrLabel(h){return toHL(h);}
function statusLabel(s){return{pending:'待審核',confirmed:'已確認',rejected:'已拒絕'}[s]||s}

function toast(msg,ms=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.display='block';el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.style.display='none',300);},ms);
}

let _confirmResolve=null;
function showConfirm(msg, isDanger=true){
  return new Promise(resolve=>{
    _confirmResolve=resolve;
    document.getElementById('confirm-msg').textContent=msg;
    const okBtn=document.getElementById('confirm-ok');
    okBtn.className='btn '+(isDanger?'btn-danger':'btn-primary');
    document.getElementById('confirm-overlay').classList.add('open');
  });
}
function closeConfirm(result){
  document.getElementById('confirm-overlay').classList.remove('open');
  if(_confirmResolve){_confirmResolve(result);_confirmResolve=null;}
}

function toggleSection(id){
  const el=document.getElementById(id),arrow=document.getElementById('arrow-'+id.replace('section-',''));
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  arrow.style.transform=open?'rotate(180deg)':'';
}

// ── 狀態 ──────────────────────────────────────────────
const MIN_H=6,MAX_H=23,STEP=0.5;
let SS={start:8,end:10};
let appData={members:[],rooms:[],bookings:[]};
let selectedMembers=new Set();
let joinTarget=null;
let calDate=new Date();calDate.setDate(1);

async function apiFetch(p){const r=await fetch(API+'?'+new URLSearchParams(p));return r.json();}
async function apiPost(b){const r=await fetch(API,{method:'POST',body:JSON.stringify(b)});return r.json();}
async function loadAll(){try{const d=await apiFetch({action:'getAll'});appData=d;}catch(e){console.error(e);}}

// ── Tab ───────────────────────────────────────────────
function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['calendar','apply','admin'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='calendar')renderCal();
  if(id==='apply')renderApplyForm();
  if(id==='admin')renderAdmin();
}

// ── 日曆 ──────────────────────────────────────────────
function navCal(dir){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);renderCal();}
function renderCal(){
  const t=today(),y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('cal-title').textContent=y+' 年 '+(m+1)+' 月';
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let html='<div class="cal-grid"><div class="cal-head">日</div><div class="cal-head">一</div><div class="cal-head">二</div><div class="cal-head">三</div><div class="cal-head">四</div><div class="cal-head">五</div><div class="cal-head">六</div>';
  const prev=new Date(y,m,0).getDate();
  for(let i=0;i<first;i++)html+='<div class="cal-day other-month"><div class="day-num">'+(prev-first+1+i)+'</div></div>';
  for(let dd=1;dd<=days;dd++){
    const ds=y+'-'+pad(m+1)+'-'+pad(dd),isT=ds===t;
    const evs=appData.bookings.filter(b=>b.date===ds);
    let ev=evs.slice(0,3).map(b=>'<div class="day-event ev-'+b.status+'" onclick="showBooking(\''+b.id+'\');event.stopPropagation()">'+b.names[0]+(b.names.length>1?'+':'')+(b.room?' ·'+b.room:'')+'</div>').join('');
    if(evs.length>3)ev+='<div style="font-size:0.65rem;color:var(--text2)">+'+(evs.length-3)+'</div>';
    html+='<div class="cal-day'+(isT?' today':'')+'" onclick="showDay(\''+ds+'\')"><div class="day-num">'+dd+'</div>'+ev+'</div>';
  }
  const rem=(7-(first+days)%7)%7;
  for(let i=1;i<=rem;i++)html+='<div class="cal-day other-month"><div class="day-num">'+i+'</div></div>';
  document.getElementById('cal-container').innerHTML=html+'</div>';
}
function showDay(ds){
  const evs=appData.bookings.filter(b=>b.date===ds);if(!evs.length)return;
  document.getElementById('modal-title-text').textContent=ds.replace(/-/g,'/')+' 借用';
  document.getElementById('modal-body').innerHTML=evs.map(b=>'<div class="booking-item"><div class="booking-meta"><strong>'+b.names.join('、')+'</strong><span class="badge badge-'+b.status+'">'+statusLabel(b.status)+'</span>'+(b.room?'<span class="tag tag-room">'+b.room+'</span>':'<span class="tag">待分配</span>')+'</div><div style="font-size:0.9rem;color:var(--text2)">'+hrLabel(b.start)+' — '+hrLabel(b.end)+'</div>'+(b.note?'<div style="font-size:0.9rem;margin-top:4px">'+b.note+'</div>':'')+'</div>').join('');
  document.getElementById('detail-modal').classList.add('open');
}
function showBooking(id){
  const b=appData.bookings.find(x=>x.id===id);if(!b)return;
  document.getElementById('modal-title-text').textContent='借用詳情';
  document.getElementById('modal-body').innerHTML='<div style="display:flex;flex-direction:column;gap:10px;font-size:0.95rem"><div><span style="color:var(--text2)">培訓生：</span><strong>'+b.names.join('、')+'</strong></div><div><span style="color:var(--text2)">日期：</span>'+b.date+'</div><div><span style="color:var(--text2)">時段：</span>'+hrLabel(b.start)+' — '+hrLabel(b.end)+'</div><div><span style="color:var(--text2)">教室：</span>'+(b.room||'待分配')+'</div><div><span style="color:var(--text2)">狀態：</span><span class="badge badge-'+b.status+'">'+statusLabel(b.status)+'</span></div>'+(b.note?'<div><span style="color:var(--text2)">說明：</span>'+b.note+'</div>':'')+'</div>';
  document.getElementById('detail-modal').classList.add('open');
}
function closeModal(e){if(!e||e.target===document.getElementById('detail-modal'))document.getElementById('detail-modal').classList.remove('open');}

// ── 申請 ──────────────────────────────────────────────
function renderApplyForm(){
  selectedMembers=new Set();joinTarget=null;
  document.getElementById('member-chips').innerHTML=appData.members.map(m=>'<div class="member-chip" onclick="toggleMember(this,\''+m+'\')">'+m+'</div>').join('');
  document.getElementById('join-group').style.display='none';
  document.getElementById('apply-date').value='';
  const cancelSel=document.getElementById('cancel-member');
  if(cancelSel){cancelSel.innerHTML='<option value="">— 選擇 —</option>'+appData.members.map(m=>'<option>'+m+'</option>').join('');document.getElementById('my-bookings').innerHTML='';}
  initSlider();
}
function toggleMember(el,name){
  if(selectedMembers.has(name)){selectedMembers.delete(name);el.classList.remove('selected');}
  else{selectedMembers.add(name);el.classList.add('selected');}
}
function onDateChange(){
  joinTarget=null;
  const date=document.getElementById('apply-date').value;
  if(!date){document.getElementById('join-group').style.display='none';return;}
  const evs=appData.bookings.filter(b=>b.date===date&&b.status!=='rejected');
  if(!evs.length){document.getElementById('join-group').style.display='none';return;}
  document.getElementById('join-group').style.display='block';
  document.getElementById('join-options').innerHTML=evs.map(b=>'<div onclick="selectJoin(\''+b.id+'\',this)" class="join-opt"><div style="font-weight:600">'+hrLabel(b.start)+' — '+hrLabel(b.end)+'</div><div style="font-size:0.85rem;color:var(--text2);margin-top:3px">'+b.names.join('、')+(b.room?' · '+b.room:'')+'</div></div>').join('');
}
function selectJoin(id,el){
  if(joinTarget===id){
    joinTarget=null;
    document.querySelectorAll('.join-opt').forEach(x=>x.classList.remove('selected'));
    SS={start:8,end:10};updateSliderUI();return;
  }
  joinTarget=id;
  document.querySelectorAll('.join-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  const b=appData.bookings.find(x=>x.id===id);
  if(b){SS.start=b.start;SS.end=b.end;updateSliderUI();}
}

// ── 滑桿 ──────────────────────────────────────────────
function snap(v){return Math.round(v/STEP)*STEP;}
function initSlider(){
  document.getElementById('hour-marks').innerHTML=[6,8,10,12,14,16,18,20,22].map(h=>'<span class="hour-mark">'+pad(h)+':00</span>').join('');
  updateSliderUI();
  if(!document.getElementById('disp-start')._bound){
    document.getElementById('disp-start')._bound=true;
    setupInputs();
    setupThumb(document.getElementById('thumb-start'),'start');
    setupThumb(document.getElementById('thumb-end'),'end');
  }
}
function hToF(h){return(h-MIN_H)/(MAX_H-MIN_H);}
function updateSliderUI(){
  const track=document.getElementById('slider-track'),w=track.clientWidth-24;
  const fs=hToF(SS.start),fe=hToF(SS.end);
  document.getElementById('thumb-start').style.left=(12+fs*w)+'px';
  document.getElementById('thumb-end').style.left=(12+fe*w)+'px';
  document.getElementById('slider-fill').style.left=(12+fs*w)+'px';
  document.getElementById('slider-fill').style.width=((fe-fs)*w)+'px';
  document.getElementById('disp-start').value=toHL(SS.start);
  document.getElementById('disp-end').value=toHL(SS.end);
  const d=SS.end-SS.start,h=Math.floor(d),m=(d-h)>=0.5?30:0;
  let dur='';if(h>0)dur+=h+' 小時';if(m>0)dur+=(dur?' ':'')+m+' 分';
  document.getElementById('disp-dur').textContent=d>0?'共 '+dur:'請調整時段';
  document.getElementById('time-error').textContent='';
  document.getElementById('disp-start').classList.remove('time-err');
  document.getElementById('disp-end').classList.remove('time-err');
}
function parseTimeInput(s){
  const m=s.trim().match(/^(\d{1,2}):(\d{2})$/);if(!m)return null;
  const h=+m[1],min=+m[2];if(min!==0&&min!==30)return null;
  const v=h+min/60;if(v<MIN_H||v>MAX_H)return null;return v;
}
function setupInputs(){
  const s=document.getElementById('disp-start'),e=document.getElementById('disp-end');
  function commit(el,which){
    const val=parseTimeInput(el.value);
    if(val===null){el.classList.add('time-err');document.getElementById('time-error').textContent='格式錯誤，請輸入如 08:00 或 08:30';return;}
    if(which==='start'&&val>=SS.end){el.classList.add('time-err');document.getElementById('time-error').textContent='開始時間必須早於結束時間';return;}
    if(which==='end'&&val<=SS.start){el.classList.add('time-err');document.getElementById('time-error').textContent='結束時間必須晚於開始時間';return;}
    SS[which]=val;updateSliderUI();
  }
  function arrowAdjust(el,which,ev){
    if(ev.key!=='ArrowUp'&&ev.key!=='ArrowDown')return;
    ev.preventDefault();
    const cur=parseTimeInput(el.value),base=cur!==null?cur:SS[which];
    const delta=ev.key==='ArrowUp'?STEP:-STEP;
    let next=Math.round((base+delta)*2)/2;
    if(which==='start')next=Math.max(MIN_H,Math.min(next,SS.end-STEP));
    else next=Math.min(MAX_H,Math.max(next,SS.start+STEP));
    SS[which]=next;updateSliderUI();
  }
  s.addEventListener('blur',()=>commit(s,'start'));
  e.addEventListener('blur',()=>commit(e,'end'));
  s.addEventListener('keydown',ev=>{if(ev.key==='Enter'){s.blur();e.focus();return;}arrowAdjust(s,'start',ev);});
  e.addEventListener('keydown',ev=>{if(ev.key==='Enter'){e.blur();return;}arrowAdjust(e,'end',ev);});
}
function setupThumb(el,which){
  function move(cx){
    const track=document.getElementById('slider-track'),rect=track.getBoundingClientRect(),raw=(cx-rect.left-12)/(rect.width-24);
    let h=snap(Math.max(MIN_H,Math.min(MAX_H,MIN_H+raw*(MAX_H-MIN_H))));
    if(which==='start')SS.start=Math.min(h,SS.end-STEP);else SS.end=Math.max(h,SS.start+STEP);
    updateSliderUI();
  }
  el.onmousedown=e=>{e.preventDefault();const mv=e=>move(e.clientX);const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);};
  el.ontouchstart=e=>{e.preventDefault();const mv=e=>move(e.touches[0].clientX);const up=()=>{document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up);};document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);};
}
window.addEventListener('resize',updateSliderUI);

// ── 送出申請 ──────────────────────────────────────────
async function submitBooking(){
  if(!selectedMembers.size){toast('請選擇至少一位借用人');return;}
  const date=document.getElementById('apply-date').value;
  if(!date){toast('請選擇日期');return;}
  const todayStr=today();
  if(date<todayStr){toast('不能申請過去的日期');return;}
  if(SS.end-SS.start<=0){toast('請調整借用時段');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='送出中…';
  try{
    let res;
    if(joinTarget){
      const b=appData.bookings.find(x=>x.id===joinTarget);
      const newNames=[...new Set([...b.names,...selectedMembers])];
      res=await apiPost({action:'updateBooking',id:joinTarget,data:{names:newNames}});
      if(res.ok)toast('已加入現有預約！');
    }else{
      res=await apiPost({action:'addBooking',data:{names:[...selectedMembers],date,start:SS.start,end:SS.end,note:document.getElementById('apply-note').value}});
      if(res.ok)toast('申請已送出！請等待管理員審核。');
    }
    if(res.error)throw new Error(res.error);
    await loadAll();
    document.getElementById('apply-date').value='';
    document.getElementById('apply-note').value='';
    selectedMembers=new Set();joinTarget=null;
    document.querySelectorAll('.member-chip').forEach(c=>c.classList.remove('selected'));
    document.getElementById('join-group').style.display='none';
    SS={start:8,end:10};updateSliderUI();
  }catch(e){toast('錯誤：'+e.message);}
  btn.disabled=false;btn.textContent='送出申請';
}

// ── 管理員 ────────────────────────────────────────────
function renderAdmin(){
  document.getElementById('member-list').innerHTML=appData.members.map(m=>'<div class="list-item">'+m+'<button class="btn btn-sm btn-danger" onclick="removeMember(\''+m+'\')">刪</button></div>').join('')||'<div style="font-size:0.9rem;color:var(--text2);padding:4px">尚無培訓生</div>';
  document.getElementById('room-list').innerHTML=appData.rooms.map(r=>'<div class="list-item">'+r+'<button class="btn btn-sm btn-danger" onclick="removeRoom(\''+r+'\')">刪</button></div>').join('')||'<div style="font-size:0.9rem;color:var(--text2);padding:4px">尚無教室</div>';
  const ab=document.getElementById('admin-bookings');
  const t=today();
  const active=appData.bookings.filter(b=>b.date>=t);
  const past=appData.bookings.filter(b=>b.date<t);
  if(!active.length&&!past.length){ab.innerHTML='<div style="text-align:center;padding:2rem;color:var(--text2)">尚無申請</div>';return;}
  const renderBooking=b=>{
    const roomOpts=appData.rooms.map(r=>'<option'+(b.room===r?' selected':'')+'>'+r+'</option>').join('');
    const sOpts=[...Array(MAX_H-MIN_H)].map((_,i)=>{const h=MIN_H+i;return'<option value="'+h+'"'+(h===b.start?' selected':'')+'>'+toHL(h)+'</option>';}).join('');
    const eOpts=[...Array(MAX_H-MIN_H)].map((_,i)=>{const h=MIN_H+i+1;return'<option value="'+h+'"'+(h===b.end?' selected':'')+'>'+toHL(h)+'</option>';}).join('');
    return'<div class="booking-item"><div class="booking-meta"><strong>'+b.names.join('、')+'</strong><span class="badge badge-'+b.status+'">'+statusLabel(b.status)+'</span><span class="tag">'+b.date+'</span></div><div style="font-size:0.9rem;color:var(--text2);margin-bottom:8px">'+hrLabel(b.start)+' — '+hrLabel(b.end)+(b.note?' · '+b.note:'')+'</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><select style="height:34px;font-size:0.85rem;width:auto" onchange="adminUpdateRoom(\''+b.id+'\',this.value)"><option value="">分配教室</option>'+roomOpts+'</select><select style="height:34px;font-size:0.85rem;width:80px" onchange="adminUpdateTime(\''+b.id+'\',\'start\',+this.value)">'+sOpts+'</select><span style="font-size:0.9rem;color:var(--text2)">→</span><select style="height:34px;font-size:0.85rem;width:80px" onchange="adminUpdateTime(\''+b.id+'\',\'end\',+this.value)">'+eOpts+'</select>'+(b.status==='pending'?'<button class="btn btn-sm btn-success" onclick="adminApprove(\''+b.id+'\')">✓ 確認</button><button class="btn btn-sm btn-danger" onclick="adminReject(\''+b.id+'\')">✗ 拒絕</button>':'<button class="btn btn-sm" onclick="adminReset(\''+b.id+'\')">改為待審</button>')+'<button class="btn btn-sm btn-danger" onclick="adminDelete(\''+b.id+'\')">刪除</button></div>'+
      '<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">'+
      '<div onclick="toggleSection(\'section-mmgmt-'+b.id+'\')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0;margin-bottom:2px">'+
      '<div style="font-size:0.82rem;color:var(--text2)">成員管理</div>'+
      '<span id="arrow-mmgmt-'+b.id+'" style="font-size:0.75rem;color:var(--text2);transition:transform .2s">▼</span>'+
      '</div>'+
      '<div id="section-mmgmt-'+b.id+'" style="display:none;margin-top:6px">'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">'+
      b.names.map(n=>'<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 10px;background:var(--bg2);border-radius:20px;font-size:0.85rem;">'+n+'<button onclick="adminRemoveMember(\''+b.id+'\',\''+n+'\')" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:1rem;line-height:1;padding:0 2px">×</button></span>').join('')+
      '</div>'+
      '<select id="add-member-'+b.id+'" style="height:32px;font-size:0.85rem;width:auto;display:inline-block;margin-right:6px"><option value="">＋ 新增培訓生</option>'+
      appData.members.filter(m=>!b.names.includes(m)).map(m=>'<option>'+m+'</option>').join('')+
      '</select>'+
      '<button class="btn btn-sm btn-success" onclick="adminAddMember(\''+b.id+'\')">加入</button>'+
      '</div>'+
      '</div></div>';
  };
  ab.innerHTML=(active.length?active.map(renderBooking).join(''):'<div style="padding:1rem;color:var(--text2);font-size:0.95rem">目前無待處理申請</div>');
  ab.innerHTML+='<div style="margin-top:1rem"><div onclick="toggleSection(\'section-past\')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;border-top:0.5px solid var(--border)"><span style="font-size:1rem;font-weight:600">過去預約紀錄 <span style="font-size:0.85rem;font-weight:400;color:var(--text2)">('+past.length+')</span></span><span id="arrow-past" style="font-size:0.85rem;color:var(--text2);transition:transform .2s">▼</span></div><div id="section-past" style="display:none;margin-top:6px">'+(past.length?past.map(renderBooking).join(''):'<div style="padding:1rem;color:var(--text2);font-size:0.95rem">無過去紀錄</div>')+'</div></div>';
}

// ── 取消預約 ──────────────────────────────────────────
function loadMyBookings(){
  const name=document.getElementById('cancel-member').value;
  const el=document.getElementById('my-bookings');
  if(!name){el.innerHTML='';return;}
  const t=today();
  const mine=appData.bookings.filter(b=>b.names.includes(name)&&b.date>=t&&b.status!=='rejected');
  if(!mine.length){el.innerHTML='<div style="font-size:0.9rem;color:var(--text2);padding:8px 0">目前沒有可取消的預約</div>';return;}
  el.innerHTML=mine.map(b=>'<div class="booking-item" style="margin-bottom:8px"><div class="booking-meta"><span class="badge badge-'+b.status+'">'+statusLabel(b.status)+'</span><span class="tag">'+b.date+'</span>'+(b.room?'<span class="tag tag-room">'+b.room+'</span>':'')+'</div><div style="font-size:0.9rem;color:var(--text2);margin-bottom:8px">'+hrLabel(b.start)+' — '+hrLabel(b.end)+(b.note?' · '+b.note:'')+'</div><div style="font-size:0.85rem;color:var(--text2);margin-bottom:8px">成員：'+b.names.join('、')+'</div><button class="btn btn-sm btn-danger" onclick="cancelMyBooking(\''+b.id+'\',\''+name+'\')">退出這筆預約</button></div>').join('');
}
async function cancelMyBooking(id, name){
  const b=appData.bookings.find(x=>x.id===id);if(!b)return;
  const ok=await showConfirm('確定要退出這筆預約？');if(!ok)return;
  if(b.names.length<=1){
    // last person, delete whole booking
    await apiPost({action:'deleteBooking',id});
    toast('已取消預約');
  } else {
    const newNames=b.names.filter(n=>n!==name);
    await apiPost({action:'updateBooking',id,data:{names:newNames}});
    toast('已退出預約');
  }
  await loadAll();
  loadMyBookings();
}

// ── 管理員成員管理 ─────────────────────────────────────
async function adminAddMember(id){
  const sel=document.getElementById('add-member-'+id);
  const name=sel.value;if(!name)return;
  const b=appData.bookings.find(x=>x.id===id);if(!b)return;
  if(b.names.includes(name)){toast('此培訓生已在名單中');return;}
  const newNames=[...b.names,name];
  await apiPost({action:'updateBooking',id,data:{names:newNames}});
  await loadAll();renderAdmin();
}
async function adminRemoveMember(id,name){
  const b=appData.bookings.find(x=>x.id===id);if(!b)return;
  if(b.names.length<=1){toast('至少需要一位培訓生');return;}
  const ok=await showConfirm('確定移除「'+name+'」？');if(!ok)return;
  const newNames=b.names.filter(n=>n!==name);
  await apiPost({action:'updateBooking',id,data:{names:newNames}});
  await loadAll();renderAdmin();
}

async function adminUpdateRoom(id,room){await apiPost({action:'updateBooking',id,data:{room}});await loadAll();renderAdmin();}
async function adminUpdateTime(id,which,val){
  const b=appData.bookings.find(x=>x.id===id);if(!b)return;
  if(which==='start'&&val>=b.end)return;
  if(which==='end'&&val<=b.start)return;
  await apiPost({action:'updateBooking',id,data:which==='start'?{start:val}:{end:val}});
  await loadAll();renderAdmin();
}
async function adminApprove(id){await apiPost({action:'updateBooking',id,data:{status:'confirmed'}});await loadAll();renderAdmin();}
async function adminReject(id){await apiPost({action:'updateBooking',id,data:{status:'rejected'}});await loadAll();renderAdmin();}
async function adminReset(id){await apiPost({action:'updateBooking',id,data:{status:'pending'}});await loadAll();renderAdmin();}
async function adminDelete(id){
  const ok=await showConfirm('確定刪除這筆預約？');
  if(!ok)return;
  await apiPost({action:'deleteBooking',id});await loadAll();renderAdmin();
}
async function addMember(){
  const v=document.getElementById('new-member').value.trim();if(!v)return;
  const res=await apiPost({action:'addMember',name:v});
  if(res.error){toast(res.error);return;}
  document.getElementById('new-member').value='';await loadAll();renderAdmin();
}
async function removeMember(name){
  const ok=await showConfirm('確定移除「'+name+'」？');
  if(!ok)return;
  await apiPost({action:'deleteMember',name});await loadAll();renderAdmin();
}
async function addRoom(){
  const v=document.getElementById('new-room').value.trim();if(!v)return;
  const res=await apiPost({action:'addRoom',name:v});
  if(res.error){toast(res.error);return;}
  document.getElementById('new-room').value='';await loadAll();renderAdmin();
}
async function removeRoom(name){
  const ok=await showConfirm('確定移除「'+name+'」？');
  if(!ok)return;
  await apiPost({action:'deleteRoom',name});await loadAll();renderAdmin();
}

(async()=>{await loadAll();renderCal();initSlider();})();

  await loadAll();

    const idx=[...document.querySelectorAll('.tab')].indexOf(activeTab);
    const tabs=['calendar','apply','admin'];
    if(idx===0)renderCal();
    if(idx===2)renderAdmin();
  }
},30000);
